apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: components-prod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: todoapp
  source:
    repoURL: https://github.com/dalthonmh/todoapp.git
    targetRevision: HEAD
    path: infra/k8s/components/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    syncOptions:
      - CreateNamespace=false
      - PruneLast=true
  # Note: prod overlay uses the real domain todoapp.store + cert-manager.
  # Make sure DNS (A record for todoapp.store) and cert-manager + ClusterIssuers are ready before syncing.
  # The overlay deploys both the Ingress and the letsencrypt ClusterIssuers.
