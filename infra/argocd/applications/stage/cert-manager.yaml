# Example: Install cert-manager via Helm using ArgoCD (fully GitOps)
# You can apply this instead of the manual one-time kubectl apply.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-20"   # Install very early
spec:
  project: todoapp
  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: v1.15.3
    helm:
      releaseName: cert-manager
      values: |
        installCRDs: true
        # You can add more values here (resources, webhooks, etc.)
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  # After this syncs, the ClusterIssuer from components-stage will be able to work.
