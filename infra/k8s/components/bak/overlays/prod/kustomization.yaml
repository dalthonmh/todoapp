apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: prod

resources:
  - ../../base
  - certificate.yaml

patches:
  - target:
      kind: Gateway
      name: todoapp-gateway
    patch: |-
      - op: add
        path: /spec/listeners/0/hostname
        value: dalthonmh.space

  - target:
      kind: HTTPRoute
      name: todoapp-route
    patch: |-
      - op: add
        path: /spec/hostnames
        value:
          - dalthonmh.space
