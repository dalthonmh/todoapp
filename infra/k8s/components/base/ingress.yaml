apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: todoapp-ingress
  # La namespace se puede inyectar desde el overlay (con `namespace:`) o vía transformer.
  # Las anotaciones específicas del Ingress Controller y el ingressClassName
  # se configuran en los overlays (dev usa nginx, prod usa traefik).
spec:
  # ingressClassName: se define en overlay
  rules:
    - host: todoapp.example.com
      http:
        paths:
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 8080
          - path: /api/tasks
            pathType: Prefix
            backend:
              service:
                name: task
                port:
                  number: 8085
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
