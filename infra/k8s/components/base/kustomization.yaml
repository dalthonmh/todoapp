apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Ingress base para todoapp.
# Define las rutas comunes (/api/auth -> auth:8080, /api/tasks -> core:3000, / -> web:80).
# Este base es "neutral": sin ingressClassName ni anotaciones específicas.
# Los overlays dev/ y prod/ aplican las personalizaciones del controller.

resources:
  - ingress.yaml
