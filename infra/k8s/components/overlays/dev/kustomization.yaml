apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dev

resources:
  - ../../base

patches:
  - target:
      kind: Gateway
      name: todoapp-gateway
    patch: |-
      - op: add
        path: /spec/listeners/0/hostname
        value: todoapp.test

  - target:
      kind: HTTPRoute
      name: todoapp-route
    patch: |-
      - op: add
        path: /spec/hostnames
        value:
          - todoapp.test
