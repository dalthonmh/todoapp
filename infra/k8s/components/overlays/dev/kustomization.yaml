apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: default

resources:
  - ../../base

# Overlay DEV: uses Ingress NGINX Controller
# - Class: nginx (common in clusters with ingress-nginx installed via Helm or manifest)
# - Host: todoapp.test (add to /etc/hosts or configure CoreDNS in kind/minikube)
# - No TLS by default (HTTP only)

patches:
  - target:
      kind: Ingress
      name: todoapp-ingress
    patch: |-
      - op: add
        path: /spec/ingressClassName
        value: nginx
      - op: replace
        path: /spec/rules/0/host
        value: todoapp.test
