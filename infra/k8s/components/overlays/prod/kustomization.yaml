apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: default

resources:
  - ../../base

# Overlay PROD: uses Traefik as Ingress Controller
# - Class: traefik
# - Traefik-specific annotation for entrypoint "web" (HTTP)
# - Host: uses the nip.io pattern to work with a VPS public IP
#   without requiring real DNS.
#
# VPS INSTRUCTIONS:
#   1. Replace "YOUR_VPS_IP" with your VPS public IP (e.g. 203.0.113.42)
#   2. The resulting hostname will be: todoapp.203.0.113.42.nip.io
#   3. nip.io automatically resolves that name to the given IP.
#   4. Make sure Traefik is installed with its IngressClass "traefik".
#   5. (Optional) If you have a real domain pointing to the VPS, replace the host
#      with your domain (e.g. todoapp.yourdomain.com) and add TLS with cert-manager.

patches:
  - target:
      kind: Ingress
      name: todoapp-ingress
    patch: |-
      - op: add
        path: /metadata/annotations
        value:
          traefik.ingress.kubernetes.io/router.entrypoints: "web"
      - op: add
        path: /spec/ingressClassName
        value: traefik
      - op: replace
        path: /spec/rules/0/host
        value: todoapp.159.203.120.126.nip.io
