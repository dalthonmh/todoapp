apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: prod

resources:
  - ../../base

patches:
  - target:
      kind: Ingress
      name: todoapp-ingress
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: dalthonmh.space

      - op: add
        path: /spec/tls
        value:
          - hosts:
              - dalthonmh.space
            secretName: todoapp-prod-tls
