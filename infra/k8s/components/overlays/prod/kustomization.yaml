apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: default

resources:
  - ../../base
  - ../../../cert-manager/prod   # ClusterIssuer for real domain TLS

# Overlay PROD: Real domain + HTTPS with cert-manager
# - Domain: todoapp.store (must point to your Droplet IP)
# - Controller: Traefik (k3s default)
# - TLS: Let's Encrypt via cert-manager (HTTP-01)
# - Entrypoints: web (HTTP) + websecure (HTTPS)

patches:
  - target:
      kind: Ingress
      name: todoapp-ingress
    patch: |-
      # Traefik entrypoints for both HTTP and HTTPS
      - op: add
        path: /metadata/annotations
        value:
          traefik.ingress.kubernetes.io/router.entrypoints: "web,websecure"
          cert-manager.io/cluster-issuer: "letsencrypt-prod"
          # For testing without hitting rate limits, use staging:
          # cert-manager.io/cluster-issuer: "letsencrypt-staging"

      # Traefik ingress class
      - op: add
        path: /spec/ingressClassName
        value: traefik

      # Real production domain
      - op: replace
        path: /spec/rules/0/host
        value: todoapp.store

      # TLS section - cert-manager will create and populate the secret
      - op: add
        path: /spec/tls
        value:
          - hosts:
              - todoapp.store
            secretName: todoapp-store-tls

