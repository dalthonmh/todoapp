      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/name: core
      app.kubernetes.io/part-of: todoapp
      env: dev
  template:
    metadata:
      annotations:
        contact: devops@todoapp.com
      labels:
        app.kubernetes.io/component: backend
        app.kubernetes.io/managed-by: kustomize
        app.kubernetes.io/name: core
