apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    contact: devops@todoapp.com
  labels:
    app.kubernetes.io/component: backend
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: auth
    app.kubernetes.io/part-of: todoapp
    env: dev
  name: auth
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: backend
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/name: auth
      app.kubernetes.io/part-of: todoapp
      env: dev
  template:
    metadata:
      annotations:
        contact: devops@todoapp.com
      labels:
        app.kubernetes.io/component: backend
        app.kubernetes.io/managed-by: kustomize
        app.kubernetes.io/name: auth
        app.kubernetes.io/part-of: todoapp
        env: dev
    spec:
      containers:
        - env:
            - name: DB_DSN
              value: root:password@tcp(mysql:3306)/authdb?charset=utf8mb4&parseTime=True&loc=Local
            - name: JWT_SECRET
              value: secret
          image: dalthonmh/todoapp-auth
          imagePullPolicy: IfNotPresent
          name: auth
      initContainers:
        - command:
            - sh
            - -c
            - until nc -z mysql 3306; do echo waiting for mysql; sleep 2; done;
          image: busybox:1.28
          name: init-mysql-wait
---
