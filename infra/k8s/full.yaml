          image: busybox:1.28
          name: init-mongo-wait
---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    contact: devops@todoapp.com
  labels:
    app.kubernetes.io/component: database
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: mongo
    app.kubernetes.io/part-of: todoapp
    env: dev
  name: mongo
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: database
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/name: mongo
      app.kubernetes.io/part-of: todoapp
      env: dev
  template:
    metadata:
      annotations:
        contact: devops@todoapp.com
      labels:
        app.kubernetes.io/component: database
        app.kubernetes.io/managed-by: kustomize
        app.kubernetes.io/name: mongo
        app.kubernetes.io/part-of: todoapp
        env: dev
    spec:
      containers:
        - image: mongo:7.0-jammy
          name: mongo
          ports:
            - containerPort: 27017
          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - db.adminCommand('ping')
            failureThreshold: 2
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - mountPath: /data/db
              name: mongodb-storage
      volumes:
        - hostPath:
            path: /tmp/k8s-mongo-data
            type: DirectoryOrCreate
          name: mongodb-storage
---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    contact: devops@todoapp.com
  labels:
    app.kubernetes.io/component: database
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: mysql
    app.kubernetes.io/part-of: todoapp
    env: dev
  name: mysql
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: database
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/name: mysql
      app.kubernetes.io/part-of: todoapp
      env: dev
  template:
    metadata:
      annotations:
        contact: devops@todoapp.com
      labels:
        app.kubernetes.io/component: database
        app.kubernetes.io/managed-by: kustomize
        app.kubernetes.io/name: mysql
        app.kubernetes.io/part-of: todoapp
        env: dev
    spec:
      containers:
        - env:
            - name: MYSQL_ROOT_PASSWORD
              value: password
          image: mysql:5.7
          name: mysql
          ports:
            - containerPort: 3306
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h localhost -u root -ppassword
            failureThreshold: 3
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - mountPath: /var/lib/mysql
              name: mysql-storage
            - mountPath: /docker-entrypoint-initdb.d
              name: mysql-initdb
      volumes:
        - hostPath:
            path: /tmp/k8s-mysql-data
            type: DirectoryOrCreate
          name: mysql-storage
        - configMap:
            name: mysql-initdb-config
          name: mysql-initdb
---
