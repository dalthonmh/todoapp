apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
spec:
  replicas: 1
  template:
    metadata:
    spec:
      containers:
        - name: mysql
          image: mysql:5.7
          args:
            - --innodb-buffer-pool-size=256M
            - --max-connections=50
            - --innodb-log-file-size=64M
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: password
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h localhost -u root -ppassword
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql
            - name: mysql-initdb
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: mysql-storage
          hostPath:
            path: /tmp/k8s-mysql-data
            type: DirectoryOrCreate
        - name: mysql-initdb
          configMap:
            name: mysql-initdb-config
